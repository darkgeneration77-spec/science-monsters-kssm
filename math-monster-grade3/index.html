<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Math Monster Adventure</title>
<style>
:root{--ink:#172033;--panel:#fff;--accent:#6c5ce7;--ok:#1f9d67;--bad:#d64545;--gold:#f5b942}*{box-sizing:border-box}body{margin:0;font-family:Inter,"Noto Sans SC",Arial,sans-serif;background:linear-gradient(#151b35,#30245e);color:#fff;min-height:100vh}.app{max-width:980px;margin:auto;padding:18px}.top{display:flex;gap:12px;align-items:center;justify-content:space-between;flex-wrap:wrap}.brand{font-weight:900;letter-spacing:.08em}.hud{display:flex;gap:8px;flex-wrap:wrap}.chip{background:#ffffff18;border:1px solid #ffffff33;border-radius:999px;padding:8px 12px}.screen{background:#ffffff0f;border:1px solid #ffffff2d;border-radius:24px;padding:24px;margin-top:18px;backdrop-filter:blur(8px)}.hidden{display:none!important}.start{display:grid;grid-template-columns:1.2fr .8fr;gap:24px;align-items:center}.start h1{font-size:clamp(36px,7vw,72px);line-height:.95;margin:.2em 0}.start input{width:100%;padding:14px;border:0;border-radius:14px;font-size:18px;margin:10px 0 14px}.primary,.answer,.tool{border:0;border-radius:14px;padding:14px 18px;font-weight:800;cursor:pointer}.primary{background:var(--gold);color:#2a2100}.hero{font-size:120px;text-align:center;filter:drop-shadow(0 12px 18px #0008)}.map{display:flex;gap:8px;align-items:center;margin-bottom:14px}.node{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;background:#ffffff20}.node.active{background:var(--gold);color:#211700}.node.done{background:var(--ok)}.line{height:4px;flex:1;background:#ffffff25;border-radius:9px}.arena{display:grid;grid-template-columns:1fr auto 1fr;align-items:end;gap:18px;min-height:240px}.fighter{text-align:center}.avatar{font-size:92px;transition:.25s}.attack .avatar{transform:translateX(28px) rotate(-8deg)}.enemy.attack .avatar{transform:translateX(-28px) rotate(8deg)}.hit .avatar{animation:shake .35s}@keyframes shake{25%{transform:translateX(-12px)}50%{transform:translateX(12px)}75%{transform:translateX(-8px)}}.bar{height:12px;background:#0005;border-radius:99px;overflow:hidden}.bar i{display:block;height:100%;background:var(--ok);width:100%;transition:.3s}.vs{font-weight:900;font-size:28px}.card{background:var(--panel);color:var(--ink);border-radius:20px;padding:20px;margin-top:16px}.meta{display:flex;justify-content:space-between;gap:12px}.question{font-size:24px;font-weight:800;line-height:1.4}.answers{display:grid;grid-template-columns:1fr 1fr;gap:10px}.answer{background:#eef0f7;color:var(--ink);text-align:left}.answer:hover{outline:3px solid #6c5ce744}.answer.correct{background:#dff6ec}.answer.wrong{background:#ffe2e2}.tools{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0}.tool{background:#2b3150;color:#fff}.feedback{margin-top:14px;padding:14px;border-radius:14px;background:#f4f5fa}.review-item{background:#fff;color:var(--ink);border-radius:16px;padding:16px;margin:12px 0}.review-item pre{white-space:pre-wrap;background:#f2f3f7;padding:12px;border-radius:12px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.stat{background:#ffffff16;padding:14px;border-radius:14px;text-align:center}.stat b{font-size:28px;display:block}@media(max-width:720px){.start{grid-template-columns:1fr}.hero{font-size:80px}.arena{min-height:180px}.avatar{font-size:64px}.answers{grid-template-columns:1fr}.stats{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<main class="app">
<div class="top"><div class="brand">MATH MONSTER ADVENTURE</div><div class="hud"><span class="chip">玩家 <b id="hudName">-</b></span><span class="chip">HP <b id="hudHp">100</b></span><span class="chip">武器 <b id="hudWeapon">木剑</b></span><span class="chip">Hint <b id="hudHint">1</b></span></div></div>
<section id="start" class="screen start"><div><p>三年级数学 · 单元4–7混合挑战</p><h1>四界怪兽<br>大冒险</h1><p>答对题目才能击退怪兽。连续答对可获得武器与提示。</p><label>学生姓名<input id="name" maxlength="24" placeholder="请输入姓名"></label><button id="startBtn" class="primary">开始战斗</button></div><div class="hero">🧙‍♂️⚔️🐉</div></section>
<section id="game" class="screen hidden"><div id="map" class="map"></div><div class="arena"><div id="player" class="fighter"><b id="playerName">Hero</b><div class="avatar">🧙‍♂️</div><div class="bar"><i id="playerHp"></i></div></div><div class="vs">VS</div><div id="enemy" class="fighter enemy"><b id="enemyName">Monster</b><div id="enemyAvatar" class="avatar">👹</div><div class="bar"><i id="enemyHp"></i></div></div></div><section class="card"><div class="meta"><span id="category"></span><span id="counter"></span></div><div id="question" class="question"></div><div class="tools"><button id="hintBtn" class="tool">使用武器 Hint</button></div><div id="hint" class="feedback hidden"></div><div id="answers" class="answers"></div><div id="feedback" class="feedback hidden"></div><button id="nextBtn" class="primary hidden" style="margin-top:12px">继续前进</button></section></section>
<section id="result" class="screen hidden"><h2>任务完成</h2><p><b id="resultName"></b>，你已经完成单元4–7混合挑战。</p><div class="stats"><div class="stat"><b id="score"></b>正确</div><div class="stat"><b id="accuracy"></b>正确率</div><div class="stat"><b id="combo"></b>最高连击</div><div class="stat"><b id="weapon"></b>最终武器</div></div><h3>错题订正</h3><div id="review"></div><button id="restart" class="primary">再玩一次</button></section>
</main>
<script>
const qs=[
{c:'钱币',q:'电钢琴售价 RM3 578，运输费 RM315.50。共须付多少钱？',a:['RM3 793.50','RM3 883.50','RM3 893.50','RM3 993.50'],k:2,h:'把 RM3 578 写成 RM3 578.00，小数点排整齐。',w:'RM3 578.00 + RM315.50 = RM3 893.50'},
{c:'时间',q:'8分钟等于多少秒？',a:['80秒','240秒','420秒','480秒'],k:3,h:'1分钟 = 60秒。',w:'8 × 60秒 = 480秒'},
{c:'空间',q:'一个立体有2个相同三角形底面和3个长方形侧面。它是什么？',a:['正方体','长方体','三角棱柱体','圆柱体'],k:2,h:'先看两个底面的形状。',w:'两个底面都是三角形，所以是三角棱柱体。'},
{c:'质量',q:'6 kg 20 g − 4 kg 820 g = ?',a:['1 kg 100 g','1 kg 200 g','2 kg 200 g','2 kg 800 g'],k:1,h:'20 g 不够减，要借 1 kg = 1 000 g。',w:'6 kg 20 g = 5 kg 1 020 g；5 kg 1 020 g − 4 kg 820 g = 1 kg 200 g'},
{c:'钱币',q:'RM700 − RM378.80 = ?',a:['RM311.20','RM321.20','RM331.20','RM421.20'],k:1,h:'先写成 RM700.00。',w:'RM700.00 − RM378.80 = RM321.20'},
{c:'时间',q:'2小时5分钟 + 1小时52分钟 = ?',a:['3小时47分钟','3小时57分钟','4小时7分钟','4小时57分钟'],k:1,h:'小时对小时，分钟对分钟。',w:'2小时5分钟 + 1小时52分钟 = 3小时57分钟'},
{c:'长度',q:'3 m 45 cm + 2 m 78 cm = ?',a:['5 m 113 cm','6 m 13 cm','6 m 23 cm','7 m 13 cm'],k:2,h:'cm 满100要换成1 m。',w:'5 m 123 cm = 6 m 23 cm'},
{c:'空间',q:'哪一个说法正确？',a:['棱柱体只有一个底面','棱柱体一定有曲面','棱柱体两个底面形状和大小相同','棱柱体没有顶点'],k:2,h:'棱柱体有两个互相平行、相同的底面。',w:'正确：棱柱体两个底面形状和大小相同。'},
{c:'钱币',q:'自行车 RM360；头盔 RM72，减价 RM7.20。共须付多少钱？',a:['RM417.20','RM424.80','RM432.00','RM439.20'],k:1,h:'先求头盔现价，再加自行车。',w:'RM72.00−RM7.20=RM64.80；RM360+RM64.80=RM424.80'},
{c:'时间',q:'2小时36分钟 − 1小时15分钟 = ?',a:['1小时11分钟','1小时21分钟','1小时31分钟','1小时51分钟'],k:1,h:'分钟够减，不需要借位。',w:'2小时36分钟 − 1小时15分钟 = 1小时21分钟'},
{c:'液体体积',q:'5 ℓ 250 mℓ + 2 ℓ 875 mℓ = ?',a:['7 ℓ 125 mℓ','7 ℓ 1 125 mℓ','8 ℓ 25 mℓ','8 ℓ 125 mℓ'],k:3,h:'1 000 mℓ = 1 ℓ。',w:'7 ℓ 1 125 mℓ = 8 ℓ 125 mℓ'},
{c:'钱币',q:'RM5 086 + RM1 523 + □ = RM8 769。□是多少？',a:['RM1 160','RM2 060','RM2 160','RM3 660'],k:2,h:'总额减去已经有的钱。',w:'RM5 086+RM1 523=RM6 609；RM8 769−RM6 609=RM2 160'},
{c:'空间',q:'图形沿一条线对折后，两边完全重合。这条线叫什么？',a:['边','对称轴','底面','棱'],k:1,h:'关键词：对折后完全重合。',w:'这条线叫对称轴。'},
{c:'时间',q:'制作1件手工作品用1小时25分钟。制作4件要多久？',a:['4小时40分钟','5小时','5小时20分钟','5小时40分钟'],k:3,h:'25分钟 × 4 = 100分钟。',w:'1小时25分钟×4=4小时100分钟=5小时40分钟'},
{c:'长度',q:'8 m 40 cm 的彩带平均剪成4段，每段多长？',a:['1 m 10 cm','2 m 10 cm','2 m 40 cm','4 m 20 cm'],k:1,h:'先换成840 cm。',w:'840 cm ÷ 4 = 210 cm = 2 m 10 cm'},
{c:'钱币',q:'6把风扇，每把 RM179.20。付款 RM1 100，应找回多少？',a:['RM14.80','RM24.80','RM25.20','RM75.20'],k:1,h:'先算总价，再用付款减总价。',w:'RM179.20×6=RM1 075.20；RM1 100−RM1 075.20=RM24.80'},
{c:'质量',q:'8 kg 400 g 平均分成4袋，每袋多重？',a:['2 kg 10 g','2 kg 100 g','2 kg 400 g','4 kg 200 g'],k:1,h:'8 kg 400 g = 8 400 g。',w:'8 400 g ÷ 4 = 2 100 g = 2 kg 100 g'},
{c:'时间',q:'限时30秒，获得5秒加时，已经用了14秒。还剩多少秒？',a:['11秒','19秒','21秒','49秒'],k:2,h:'先加时，再减去已用时间。',w:'30+5−14=21秒'},
{c:'空间',q:'一个三角棱柱体有多少个顶点？',a:['3个','5个','6个','8个'],k:2,h:'每个三角形有3个顶点，共两个底面。',w:'3+3=6个顶点'},
{c:'时间',q:'活动2小时35分钟，整理45分钟，报告1小时20分钟。共多久？',a:['3小时40分钟','4小时','4小时40分钟','5小时40分钟'],k:2,h:'先把分钟相加：35+45+20。',w:'2小时35分+45分+1小时20分=3小时100分=4小时40分'}
];
const monsters=[['钱币盗贼','🦹'],['时钟巨兽','⏰'],['度量石魔','🗿'],['棱柱龙王','🐉']];let i=0,hp=100,correct=0,combo=0,best=0,hints=1,weapon='木剑',wrong=[],locked=false,name='Student';const $=x=>document.getElementById(x);
function map(){let s='';for(let n=0;n<qs.length;n+=5){s+=`<div class="node ${n<i?'done':n<=i&&i<n+5?'active':''}">${n/5+1}</div>`;if(n<15)s+='<div class="line"></div>'}$('map').innerHTML=s}
function render(){locked=false;map();const q=qs[i],m=monsters[Math.floor(i/5)];$('category').textContent='混合挑战';$('counter').textContent=`${i+1} / ${qs.length}`;$('question').textContent=q.q;$('enemyName').textContent=m[0];$('enemyAvatar').textContent=m[1];$('answers').innerHTML='';q.a.forEach((x,n)=>{const b=document.createElement('button');b.className='answer';b.textContent=`${String.fromCharCode(65+n)}. ${x}`;b.onclick=()=>answer(n,b);$('answers').appendChild(b)});$('feedback').classList.add('hidden');$('hint').classList.add('hidden');$('nextBtn').classList.add('hidden');$('hudHp').textContent=hp;$('hudHint').textContent=hints;$('hudWeapon').textContent=weapon;$('playerHp').style.width=hp+'%';$('enemyHp').style.width=((5-(i%5))/5*100)+'%'}
function answer(n,b){if(locked)return;locked=true;const q=qs[i],ok=n===q.k;[...$('answers').children].forEach((x,j)=>{if(j===q.k)x.classList.add('correct')});if(ok){correct++;combo++;best=Math.max(best,combo);$('player').classList.add('attack');$('enemy').classList.add('hit');$('feedback').innerHTML='<b>答对！怪兽受到攻击。</b><br>'+q.w}else{combo=0;hp=Math.max(0,hp-15);b.classList.add('wrong');$('enemy').classList.add('attack');$('player').classList.add('hit');wrong.push({...q,y:q.a[n]});$('feedback').innerHTML='<b>答错。正确答案：'+q.a[q.k]+'</b><br>'+q.w}if(correct>=12){weapon='黄金剑';hints=Math.max(hints,3)}else if(correct>=6){weapon='铁剑';hints=Math.max(hints,2)}$('feedback').classList.remove('hidden');$('nextBtn').classList.remove('hidden');setTimeout(()=>{$('player').classList.remove('attack','hit');$('enemy').classList.remove('attack','hit')},450)}
$('hintBtn').onclick=()=>{if(hints<1||locked)return;$('hint').textContent=qs[i].h;$('hint').classList.remove('hidden');hints--;$('hudHint').textContent=hints};$('nextBtn').onclick=()=>{i++;if(i<qs.length)render();else finish()};
function finish(){$('game').classList.add('hidden');$('result').classList.remove('hidden');$('resultName').textContent=name;$('score').textContent=`${correct}/${qs.length}`;$('accuracy').textContent=Math.round(correct/qs.length*100)+'%';$('combo').textContent=best+'×';$('weapon').textContent=weapon;$('review').innerHTML=wrong.length?wrong.map((q,n)=>`<div class="review-item"><b>错题 ${n+1}｜${q.c}</b><p>${q.q}</p><p>你的答案：${q.y}</p><p>正确答案：${q.a[q.k]}</p><pre>${q.w}</pre></div>`).join(''):'<p>全部正确，没有错题。</p>'}
$('startBtn').onclick=()=>{name=$('name').value.trim()||'Student';$('hudName').textContent=name;$('playerName').textContent=name;$('start').classList.add('hidden');$('game').classList.remove('hidden');render()};$('restart').onclick=()=>location.reload();
</script>
</body>
</html>
